<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NBA日本語まとめ・速報・ハイライト</title>
<meta name="description" content="NBAの試合速報・ハイライト動画・海外反応を日本語でリアルタイム配信。河村勇輝・八村塁の最新情報、スタッツ、順位表も。">
<meta name="keywords" content="NBA,NBA日本語,NBAまとめ,NBAハイライト,NBA速報,河村勇輝,八村塁,NBAプレーオフ,NBA順位表,NBAスタッツ">
<meta name="author" content="MENTALITY">
<meta property="og:title" content="NBA日本語まとめ・速報・ハイライト">
<meta property="og:description" content="NBAの試合速報・ハイライト動画・海外反応を日本語でリアルタイム配信。河村勇輝・八村塁の最新情報も。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://reliable-kitsune-62166e.netlify.app">
<meta property="og:site_name" content="MENTALITY">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="NBA日本語まとめ・速報・ハイライト">
<meta name="twitter:description" content="NBAの試合速報・ハイライト動画・海外反応を日本語でリアルタイム配信。">

<!-- ===== CSS (読み込み順: base → layout → 各機能) ===== -->
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/schedule.css">
<link rel="stylesheet" href="css/players.css">
<link rel="stylesheet" href="css/stats.css">
<link rel="stylesheet" href="css/chat.css">
<link rel="stylesheet" href="css/news.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

</head>
<body>


<nav class="top-nav">
  <div class="logo">MENT<span>ALITY</span></div>
  <div class="nav-online">
    <span class="nav-online-dot"></span>
    <span id="siteOnlineCount">-- 人が閲覧中</span>
  </div>
  <div class="nav-sp"></div>
  <button class="nav-search" onclick="toggleSearch()">🔍</button>
</nav>


<nav class="second-nav">
  <button class="sn on" id="sn-schedule" onclick="goPage('schedule',this)">試合情報</button>
  <div class="sn-divider"></div>
  <button class="sn" id="sn-news"     onclick="goPage('news',this)">速報</button>
  <div class="sn-divider"></div>
  <button class="sn" id="sn-stats"    onclick="goPage('stats',this)">スタッツ</button>
  <div class="sn-divider"></div>
  <button class="sn" id="sn-teams"    onclick="goPage('teams',this)">チャット</button>
  <button class="sn" id="sn-articles" onclick="goPage('articles',this)">記事</button>
  <div class="sn-divider"></div>
  <button class="sn" id="sn-players"  onclick="goPage('players',this)">選手一覧</button>
</nav>


<div class="srch-overlay" id="srchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="srch-box">
    <div class="si-row">
      <span class="si-ico">🔍</span>
      <input class="si-inp" id="srchInp"
        placeholder="選手・チーム・ニュースを検索..."
        oninput="doSearch(this.value)"
        autocomplete="off">
      <button class="si-close" onclick="closeSearch()">✕</button>
    </div>
    <div class="srch-tags">
      <button class="stag" onclick="qs('河村勇輝')">河村勇輝</button>
      <button class="stag" onclick="qs('八村塁')">八村塁</button>
      <button class="stag" onclick="qs('LAL')">LAL</button>
      <button class="stag" onclick="qs('GSW')">GSW</button>
      <button class="stag" onclick="qs('トレード')">トレード</button>
    </div>
    <div class="srch-results" id="srchResults">
      <div class="srch-empty">
        <div style="font-size:2rem;margin-bottom:.4rem;">🏀</div>
        <div style="font-size:.78rem;color:var(--tx3);">選手・チーム名で検索</div>
      </div>
    </div>
  </div>
</div>


<div class="main" id="mainScroll">

  
  <div class="pg show" id="pg-schedule">
    <div class="pg-title">本日の試合情報 <span class="pg-badge badge-live">TODAY</span></div>
    <div class="date-bar">
      <button class="db-btn" onclick="moveDate(-1)">‹</button>
      <div class="db-center">
        <div class="db-date" id="dbDate"></div>
        <div class="db-sub"  id="dbSub"></div>
      </div>
      <button class="db-btn" onclick="moveDate(1)">›</button>
    </div>
    <div id="gameWrap"></div>
  </div>

  
  <div class="pg" id="pg-news">
    <div class="pg-title">NBA速報 <span class="pg-badge badge-live">日本語</span></div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:.5rem;">
      <button onclick="rssLoaded=false;loadRSSNews()" style="background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:.3rem .7rem;font-size:.7rem;color:var(--tx3);cursor:pointer;">🔄 更新</button>
    </div>
    <div id="rssFeed" class="rss-feed-wrap">
      <div class="rss-loading">最新ニュースを取得中...</div>
    </div>
  </div>

  
  <div class="pg" id="pg-stats">
    <div class="pg-title">スタッツ/順位 <span class="pg-badge badge-season">2025-26</span></div>

    
    <div class="conf-row" style="margin-bottom:.65rem;">
      <button class="conf-btn on" id="btn-season"  onclick="switchMode(this,'season')">レギュラー</button>
      
    </div>

    <div class="pg-title" style="font-size:.95rem;margin-bottom:.45rem;">スタッツ</div>

    
    <div style="display:flex;gap:.4rem;margin-bottom:.5rem;">
      <button class="stat-type-btn on" onclick="switchStatType(this,'avg')">平均</button>
    </div>

    <div class="stat-cats" id="statCats"></div>
    <div id="statsLoading" style="display:none;">📊 データ取得中...</div>
    <div class="leader-list" id="leaderList"></div>

    
    <div style="margin-top:1.2rem;">
      <div class="pg-title" style="font-size:.95rem;">順位表</div>
      <div class="conf-row">
        <button class="conf-btn on" onclick="showConf(this,'east')">イースト</button>
        <button class="conf-btn"    onclick="showConf(this,'west')">ウェスト</button>
      </div>
      <div id="standingsWrap"></div>
    </div>
  </div>

  
  <div id="playerModal"
    style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;background:var(--bg);overflow:hidden;"
    onclick="if(event.target===this)closePlayerModal()">
    <div style="width:100%;height:100%;display:flex;flex-direction:column;">
      <div id="playerModalInner"
        style="background:var(--bg);width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;">
      </div>
    </div>
  </div>

  
  <div class="pg" id="pg-teams">
    <div class="pg-title">チームチャット <span class="pg-badge badge-season">30チーム</span></div>
    <div class="conf-row">
      <button class="conf-btn on" onclick="filterConf(this,'east')">イースト</button>
      <button class="conf-btn"    onclick="filterConf(this,'west')">ウェスト</button>
      <button class="conf-btn"    onclick="filterConf(this,'all')">全30</button>
    </div>
    <div id="teamList"></div>
  </div>

  
  <div class="pg" id="pg-players">
    <div class="pg-title">チーム/選手一覧</div>

    <div style="position:relative;margin-bottom:.6rem;">
      <span style="position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--tx3);">🔍</span>
      <input id="playerSearchInput" type="text"
        placeholder="選手名を検索（例：LeBron, カリー）"
        class="player-search-input"
        oninput="filterPlayers(this.value)">
    </div>

    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:.65rem;">
      <div id="playerFilter" style="display:inline-flex;gap:.35rem;padding:.1rem .05rem;"></div>
    </div>

    <div id="playerGrid" style="display:flex;flex-direction:column;gap:.45rem;"></div>

    
    <div id="playerDetailModal"
      style="display:none;position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;overflow-x:hidden;">
      <div style="max-width:480px;margin:0 auto;overflow-x:hidden;">
        <div id="playerDetailContent"></div>
      </div>
    </div>
  </div>

  <!-- 記事ページ -->
  <div class="pg" id="pg-articles">
    <div class="pg-title">記事</div>
    <div id="articlesWrap"></div>
  </div>

  <!-- 記事詳細モーダル -->
  <div id="articleModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:400;background:var(--bg);overflow-y:auto;">
    <div style="padding:.6rem 1rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:.5rem;position:sticky;top:0;background:var(--bg);z-index:1;">
      <button onclick="closeArticleModal()" style="background:var(--bg3);border:none;color:var(--tx);padding:.3rem .7rem;border-radius:8px;font-size:.75rem;cursor:pointer;">← 戻る</button>
    </div>
    <div id="articleModalBody"></div>
  </div>

  <!-- 広告管理モーダル -->
  <div id="adManagerModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;background:var(--bg);overflow-y:auto;">
    <div style="padding:.6rem 1rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:.5rem;position:sticky;top:0;background:var(--bg);z-index:1;">
      <button onclick="closeAdManager()" style="background:var(--bg3);border:none;color:var(--tx);padding:.3rem .7rem;border-radius:8px;font-size:.75rem;cursor:pointer;">← 戻る</button>
      <span style="font-size:.85rem;font-weight:700;color:var(--tx);">広告管理</span>
    </div>
    <div style="padding:1rem;">
      <div style="margin-bottom:1rem;">
        <div style="font-size:.75rem;font-weight:700;color:var(--tx2);margin-bottom:.5rem;">登録済み広告</div>
        <div id="adManagerList"></div>
      </div>
      <div style="border-top:1px solid var(--bd);padding-top:1rem;">
        <div style="font-size:.75rem;font-weight:700;color:var(--tx2);margin-bottom:.5rem;">新規追加</div>
        <div style="margin-bottom:.6rem;"><input id="adTitle" type="text" placeholder="タイトル（必須）" style="width:100%;padding:.5rem;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:.8rem;box-sizing:border-box;"></div>
        <div style="margin-bottom:.6rem;"><input id="adDesc" type="text" placeholder="説明文" style="width:100%;padding:.5rem;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:.8rem;box-sizing:border-box;"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.6rem;">
          <input id="adTag" type="text" placeholder="タグ（例：バッシュ）" style="padding:.5rem;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:.8rem;box-sizing:border-box;">
          <input id="adPrice" type="text" placeholder="価格（例：¥22,000）" style="padding:.5rem;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:.8rem;box-sizing:border-box;">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.6rem;">
          <input id="adIcon" type="text" placeholder="アイコン絵文字（例：👟）" style="padding:.5rem;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:.8rem;box-sizing:border-box;">
          <input id="adColor" type="color" value="#FF5A00" style="padding:.3rem;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);height:36px;box-sizing:border-box;">
        </div>
        <div style="margin-bottom:.8rem;"><input id="adUrl" type="text" placeholder="リンクURL（必須）" style="width:100%;padding:.5rem;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:.8rem;box-sizing:border-box;"></div>
        <button id="adSubmitBtn" onclick="submitAd()" style="width:100%;padding:.7rem;background:var(--or);border:none;color:#fff;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;">追加する</button>
      </div>
    </div>
  </div>

  <!-- 管理者モーダル -->
  <div id="adminModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;background:var(--bg);overflow-y:auto;">
    <div style="padding:.6rem 1rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:.5rem;position:sticky;top:0;background:var(--bg);z-index:1;">
      <button onclick="closeAdminModal()" style="background:var(--bg3);border:none;color:var(--tx);padding:.3rem .7rem;border-radius:8px;font-size:.75rem;cursor:pointer;">← 戻る</button>
      <span style="font-size:.85rem;font-weight:700;color:var(--tx);">記事投稿</span>
    </div>
    <div style="padding:1rem;">
      <div style="margin-bottom:.8rem;">
        <div style="font-size:.7rem;color:var(--tx3);margin-bottom:.3rem;">カテゴリ</div>
        <select id="adminCategory" style="width:100%;padding:.5rem;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:.8rem;">
          <option>NBA</option><option>Bリーグ</option><option>河村勇輝</option><option>八村塁</option><option>スキルコーチ</option><option>面白動画</option>
        </select>
      </div>
      <div style="margin-bottom:.8rem;">
        <div style="font-size:.7rem;color:var(--tx3);margin-bottom:.3rem;">タイトル</div>
        <input id="adminTitle" type="text" placeholder="記事タイトル" style="width:100%;padding:.5rem;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:.8rem;box-sizing:border-box;">
      </div>
      <div style="margin-bottom:.8rem;">
        <div style="font-size:.7rem;color:var(--tx3);margin-bottom:.3rem;">サムネイル画像URL（任意）</div>
        <input id="adminImg" type="text" placeholder="https://..." style="width:100%;padding:.5rem;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:.8rem;box-sizing:border-box;">
      </div>
      <div style="margin-bottom:.5rem;">
        <div style="font-size:.7rem;color:var(--tx3);margin-bottom:.3rem;">本文エディタ</div>
        <div style="display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.4rem;">
          <button onclick="insertToBody('image')" style="background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:.3rem .6rem;border-radius:6px;font-size:.7rem;cursor:pointer;">🖼 画像</button>
          <button onclick="insertToBody('youtube')" style="background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:.3rem .6rem;border-radius:6px;font-size:.7rem;cursor:pointer;">▶️ YouTube</button>
          <button onclick="insertToBody('tiktok')" style="background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:.3rem .6rem;border-radius:6px;font-size:.7rem;cursor:pointer;">🎵 TikTok</button>
          <button onclick="insertToBody('instagram')" style="background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:.3rem .6rem;border-radius:6px;font-size:.7rem;cursor:pointer;">📸 Insta</button>
          <button onclick="insertToBody('twitter')" style="background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:.3rem .6rem;border-radius:6px;font-size:.7rem;cursor:pointer;">🐦 X</button>
        </div>
        <textarea id="adminBody" placeholder="本文を入力...URLを直接貼り付けもOK" rows="12" style="width:100%;padding:.5rem;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:.8rem;box-sizing:border-box;resize:vertical;" oninput="updatePreview()"></textarea>
      </div>
      <div style="margin-bottom:1rem;">
        <div style="font-size:.7rem;color:var(--tx3);margin-bottom:.3rem;">プレビュー</div>
        <div id="adminPreview" style="background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:.8rem;min-height:60px;font-size:.78rem;color:var(--tx2);line-height:1.8;"></div>
      </div>
      <button id="adminSubmitBtn" onclick="submitArticle()" style="width:100%;padding:.7rem;background:var(--or);border:none;color:#fff;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;">投稿する</button>
    </div>
  </div>

</div>


<footer class="footer">
  <div class="foot-links">
    <span class="foot-link" onclick="openLegal('tokusho')">特定商取引法</span>
    <span class="foot-link" onclick="openLegal('privacy')">プライバシー</span>
    <span class="foot-link" onclick="openLegal('terms')">利用規約</span>
    <span class="foot-link" onclick="openLegal('contact')">お問い合わせ</span>
  </div>
  <span class="foot-copy">© 2026 MENTALITY</span>
</footer>


<div id="legalModal" style="display:none;position:fixed;inset:0;z-index:500;background:var(--bg);overflow-y:auto;">
  <div style="max-width:480px;margin:0 auto;padding:1rem;">
    
    <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:1.2rem;padding-bottom:.75rem;border-bottom:1px solid var(--bd);">
      <button onclick="closeLegal()" style="width:32px;height:32px;border-radius:6px;background:var(--bg3);border:1px solid var(--bd);cursor:pointer;font-size:.85rem;color:var(--tx2);">←</button>
      <div id="legalTitle" style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.1em;color:var(--tx);"></div>
    </div>
    <div id="legalContent" style="font-size:.8rem;color:var(--tx2);line-height:1.9;"></div>
  </div>
</div>




<!-- ===== JS (読み込み順: data → utils → app → 各機能) ===== -->
<!-- data.js  : 定数・API設定・固定データ。他の全ファイルが参照する -->
<script src="js/data.js"></script>
<!-- utils.js : 共通ユーティリティ関数。data.jsの後に読む -->
<script src="js/utils.js"></script>
<!-- app.js   : ページ切り替え・オンライン人数・初期化 -->
<script src="js/app.js"></script>
<!-- 各機能JS : app.jsの後に読む -->
<script src="js/schedule.js"></script>
<script src="js/stats.js"></script>
<script src="js/news.js"></script>
<script src="js/chat.js"></script>
<script src="js/articles.js"></script>
<script src="js/players.js"></script>
<script src="js/search.js"></script>
</body>
</html>
