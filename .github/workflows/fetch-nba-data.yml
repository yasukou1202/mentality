name: Fetch NBA Data
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch NBA Data
        run: |
          H="Referer: https://www.nba.com"
          BASE="https://stats.nba.com/stats/leagueleaders?LeagueID=00&PerMode=PerGame&Scope=S&Season=2025-26"
          curl -s "$BASE&SeasonType=Regular+Season&StatCategory=PTS" -H "$H" > /tmp/pts.json
          curl -s "$BASE&SeasonType=Regular+Season&StatCategory=AST" -H "$H" > /tmp/ast.json
          curl -s "$BASE&SeasonType=Regular+Season&StatCategory=REB" -H "$H" > /tmp/reb.json
          curl -s "$BASE&SeasonType=Regular+Season&StatCategory=STL" -H "$H" > /tmp/stl.json
          curl -s "$BASE&SeasonType=Regular+Season&StatCategory=BLK" -H "$H" > /tmp/blk.json
          curl -s "$BASE&SeasonType=Regular+Season&StatCategory=FG3_PCT" -H "$H" > /tmp/fg3.json
          curl -s "$BASE&SeasonType=Regular+Season&StatCategory=FG_PCT" -H "$H" > /tmp/fg.json
          curl -s "$BASE&SeasonType=Regular+Season&StatCategory=FT_PCT" -H "$H" > /tmp/ft.json
          curl -s "$BASE&SeasonType=Playoffs&StatCategory=PTS" -H "$H" > /tmp/po_pts.json
          curl -s "https://site.api.espn.com/apis/v2/sports/basketball/nba/standings?season=2026&seasontype=2" > /tmp/standings.json
          python3 merge_data.py
      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "update nba data"
          git push
