name: Fetch NBA Data
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch ESPN Data
        run: |
          curl -s "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/leaders?limit=15&season=2025&seasontype=2" > /tmp/leaders.json
          curl -s "https://site.api.espn.com/apis/v2/sports/basketball/nba/standings?season=2025&seasontype=2" > /tmp/standings.json
          curl -s "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/leaders?limit=50&season=2025&seasontype=2" > /tmp/players.json
          echo "{\"leaders\":$(cat /tmp/leaders.json),\"standings\":$(cat /tmp/standings.json),\"players\":$(cat /tmp/players.json)}" > data.json
      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "update nba data"
          git push
