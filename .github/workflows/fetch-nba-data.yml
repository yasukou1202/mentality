name: Fetch NBA Data
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch NBA Data
        run: |
          curl -s "https://stats.nba.com/stats/leagueleaders?LeagueID=00&PerMode=PerGame&Scope=S&Season=2025-26&SeasonType=Regular+Season&StatCategory=PTS" -H "Referer: https://www.nba.com" > /tmp/pts.json
          curl -s "https://stats.nba.com/stats/leagueleaders?LeagueID=00&PerMode=PerGame&Scope=S&Season=2025-26&SeasonType=Regular+Season&StatCategory=AST" -H "Referer: https://www.nba.com" > /tmp/ast.json
          curl -s "https://stats.nba.com/stats/leagueleaders?LeagueID=00&PerMode=PerGame&Scope=S&Season=2025-26&SeasonType=Regular+Season&StatCategory=REB" -H "Referer: https://www.nba.com" > /tmp/reb.json
          curl -s "https://stats.nba.com/stats/leagueleaders?LeagueID=00&PerMode=PerGame&Scope=S&Season=2025-26&SeasonType=Playoffs&StatCategory=PTS" -H "Referer: https://www.nba.com" > /tmp/po_pts.json
          curl -s "https://site.api.espn.com/apis/v2/sports/basketball/nba/standings?season=2026&seasontype=2" > /tmp/standings.json
          echo "{\"pts\":$(cat /tmp/pts.json),\"ast\":$(cat /tmp/ast.json),\"reb\":$(cat /tmp/reb.json),\"po_pts\":$(cat /tmp/po_pts.json),\"standings\":$(cat /tmp/standings.json)}" > data.json
      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "update nba data"
          git push
